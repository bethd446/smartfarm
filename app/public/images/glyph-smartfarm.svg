  <path d="M24 27 C 15 25.5, 9 19.5, 7.5 10.5 C 16.5 12, 22.5 16.5, 24 25.5 Z" fill="#2D4A1F"/>
  <!-- Feuille droite -->
  <path d="M24 21 C 33 19.5, 39 13.5, 40.5 4.5 C 31.5 6, 25.5 10.5, 24 19.5 Z" fill="#2D4A1F"/>
  <!-- Sol terre cuite -->
  <rect x="10.5" y="44" width="27" height="2.5" fill="#B8703D"/>
  <rect x="13.5" y="47.2" width="21" height="1.5" fill="#B8703D" opacity="0.7"/>
</svg>
