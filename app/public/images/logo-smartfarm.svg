<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 80" width="220" height="80" role="img" aria-label="Smart Farm">
  <title>Smart Farm</title>
  <!--
    Smart Farm — Logo Terrain Vivant
    DNA : trait épais, pas de gradient, pas de 3D, lisible plein soleil.
    Glyph : pousse stylisée (deux feuilles + tige) sur un sol.
    Wordmark : Big Shoulders Display, uppercase, tracking serré.
  -->
  <defs>
    <style>
      .sf-ink   { fill: #2D4A1F; }
      .sf-soil  { fill: #B8703D; }
      .sf-word  { fill: #2D4A1F; font-family: 'Big Shoulders Display', 'Impact', sans-serif; font-weight: 800; letter-spacing: 0.04em; }
    </style>
  </defs>

  <!-- Glyph : pousse + sol — boîte 64x64 alignée à gauche -->
  <g transform="translate(8 8)">
    <!-- Tige -->
    <path d="M32 60 L32 32" stroke="#2D4A1F" stroke-width="4" stroke-linecap="square" fill="none"/>
    <!-- Feuille gauche -->
    <path d="M32 36 C 20 34, 12 26, 10 14 C 22 16, 30 22, 32 34 Z" class="sf-ink"/>
    <!-- Feuille droite -->
    <path d="M32 28 C 44 26, 52 18, 54 6 C 42 8, 34 14, 32 26 Z" class="sf-ink"/>
    <!-- Nervure feuille gauche -->
    <path d="M12 16 L 30 32" stroke="#FAF7F0" stroke-width="1.2" fill="none" stroke-linecap="round"/>
    <!-- Nervure feuille droite -->
    <path d="M52 8 L 32 28" stroke="#FAF7F0" stroke-width="1.2" fill="none" stroke-linecap="round"/>
    <!-- Sol / terre cuite (deux traits horizontaux) -->
    <rect x="14" y="60" width="36" height="3" class="sf-soil"/>
    <rect x="18" y="65" width="28" height="2" class="sf-soil" opacity="0.7"/>
  </g>

  <!-- Wordmark -->
  <text x="84" y="42" class="sf-word" font-size="26">SMART</text>
  <text x="84" y="68" class="sf-word" font-size="26">FARM</text>
</svg>
