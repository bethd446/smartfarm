# Smart Farm — CI (pull requests)
# Vérifie typecheck + build sur chaque PR, sans cache npm (test propre).

name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Lint & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install deps (no cache)
        run: npm ci --no-audit --no-fund

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Next build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
