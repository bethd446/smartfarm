# Smart Farm — Smoke prod (e2e Playwright contre smartfarm.group)
#
# Lancé après chaque deploy main (push) + déclenchable manuellement.
# Cible : https://smartfarm.group + login démo réel.
# Une régression bloque visiblement la livraison.

name: smoke-prod

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      url:
        description: "URL à smoke-tester (override SMOKE_URL)"
        required: false
        default: "https://smartfarm.group"

jobs:
  smoke:
    name: Playwright smoke prod
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: app/package-lock.json

      - name: Install deps
        run: npm ci --no-audit --no-fund

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # Petit délai pour laisser le déploiement Hostinger se propager (~3 min build)
      - name: Wait for prod deploy (180s)
        if: github.event_name == 'push'
        run: sleep 180

      # Probe connectivity GHA runner → prod (diagnostic Playwright failures)
      - name: Probe prod from runner
        if: always()
        run: |
          set +e
          echo "===Public IP runner==="
          curl -s --max-time 5 https://api.ipify.org && echo
          echo "===HTTP GET /connexion (verbose)==="
          curl -sv --max-time 15 -o /tmp/connexion.html -w "\nHTTP %{http_code} TIME %{time_total}s SIZE %{size_download}\n" https://smartfarm.group/connexion 2>&1 | tail -40
          echo "===User-Agent check (Playwright vs curl)==="
          curl -s --max-time 10 -o /dev/null -w "curl UA: HTTP %{http_code}\n" https://smartfarm.group/connexion
          curl -s --max-time 10 -A "Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) HeadlessChrome/131.0.0.0 Safari/537.36" -o /dev/null -w "HeadlessChrome UA: HTTP %{http_code}\n" https://smartfarm.group/connexion
          echo "===HTML head /connexion==="
          head -80 /tmp/connexion.html
          echo ""
          echo "===Supabase auth from runner==="
          curl -s --max-time 10 -X POST "https://tpzhxjzwlxwujboboyit.supabase.co/auth/v1/token?grant_type=password" \
            -H "apikey: sb_publishable_VdYNHQZS-1ZMMSO4tpiVIg_bETYXHIT" \
            -H "Content-Type: application/json" \
            -d '{"email":"demo@smartfarm.group","password":"Demo6734N0xUHH1I"}' \
            -o /tmp/auth.json -w "HTTP %{http_code} TIME %{time_total}s\n"
          jq -r '.access_token // .error // "no_token"' /tmp/auth.json | head -c 80; echo

      - name: Smoke desktop
        env:
          SMOKE_URL: ${{ github.event.inputs.url || 'https://smartfarm.group' }}
          SMOKE_EMAIL: ${{ secrets.SMOKE_EMAIL || 'demo@smartfarm.group' }}
          SMOKE_PASS: ${{ secrets.SMOKE_PASS }}
        run: npm run e2e:smoke:desktop

      - name: Smoke mobile
        env:
          SMOKE_URL: ${{ github.event.inputs.url || 'https://smartfarm.group' }}
          SMOKE_EMAIL: ${{ secrets.SMOKE_EMAIL || 'demo@smartfarm.group' }}
          SMOKE_PASS: ${{ secrets.SMOKE_PASS }}
        run: npm run e2e:smoke:mobile

      - name: Upload Playwright report + test-results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-smoke-report-${{ github.run_id }}
          path: |
            app/playwright-report/
            app/test-results/
          retention-days: 14
          if-no-files-found: ignore
