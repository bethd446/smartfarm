# Smart Farm — Smoke prod (e2e Playwright contre smartfarm.group)
#
# Lancé après chaque deploy main (push) + déclenchable manuellement.
# Cible : https://smartfarm.group + login démo réel.
# Une régression bloque visiblement la livraison.
#
# V3 (2026-05-27) : split en 2 jobs PARALLÈLES (desktop + mobile)
# pour ~2× plus rapide + diagnostic indépendant par viewport.

name: smoke-prod

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      url:
        description: "URL à smoke-tester (override SMOKE_URL)"
        required: false
        default: "https://smartfarm.group"

jobs:
  smoke-desktop:
    name: Playwright smoke prod (desktop)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: app/package-lock.json

      - name: Install deps
        run: npm ci --no-audit --no-fund

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # Petit délai pour laisser le déploiement Hostinger se propager (~3 min build)
      - name: Wait for prod deploy (180s)
        if: github.event_name == 'push'
        run: sleep 180

      # Pre-warm Hostinger Passenger — attente CONDITIONNELLE (poll until ready).
      # Passenger Cloud ne sert qu'1 cold-start à la fois → thunder herd entre les
      # 2 jobs // sur instance froide. On poll /connexion jusqu'à 3 réponses 200
      # CONSÉCUTIVES (serveur stable) avant de lancer Playwright, au lieu d'un
      # warm-up fixe (3 curls) qui ne garantissait pas l'état chaud. Max ~120s.
      - name: Pre-warm Hostinger (poll until ready)
        if: always()
        run: |
          set +e
          echo "Polling Hostinger Passenger until warm (3 consecutive HTTP 200)..."
          ok=0
          for i in $(seq 1 40); do
            CODE=$(curl -s --max-time 10 -o /dev/null -w "%{http_code}" https://smartfarm.group/connexion)
            echo "  Hit $i: HTTP $CODE (consecutive ok=$ok)"
            if [ "$CODE" = "200" ]; then
              ok=$((ok + 1))
              if [ "$ok" -ge 3 ]; then echo "Server warm after $i hits."; break; fi
            else
              ok=0
            fi
            sleep 3
          done

      - name: Smoke desktop
        env:
          SMOKE_URL: ${{ github.event.inputs.url || 'https://smartfarm.group' }}
          SMOKE_EMAIL: ${{ secrets.SMOKE_EMAIL || 'demo@smartfarm.group' }}
          SMOKE_PASS: ${{ secrets.SMOKE_PASS }}
        run: npm run e2e:smoke:desktop

      - name: Upload Playwright report + test-results (desktop)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-smoke-desktop-${{ github.run_id }}
          path: |
            app/playwright-report/
            app/test-results/
          retention-days: 14
          if-no-files-found: ignore

  smoke-mobile:
    name: Playwright smoke prod (mobile Pixel 7)
    runs-on: ubuntu-latest
    # Sérialisé APRÈS desktop : élimine le thunder herd POST-login (2 logins
    # simultanés sur Passenger sous double charge dépassaient le timeout setup).
    # Quand ce job démarre, desktop a déjà propagé le deploy + réchauffé le serveur.
    needs: smoke-desktop
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: app/package-lock.json

      - name: Install deps
        run: npm ci --no-audit --no-fund

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # Pre-warm identique au job desktop — ce job en était dépourvu et partait
      # à froid, d'où des faux-négatifs cold-start sur le auth.setup partagé.
      - name: Pre-warm Hostinger (poll until ready)
        if: always()
        run: |
          set +e
          echo "Polling Hostinger Passenger until warm (3 consecutive HTTP 200)..."
          ok=0
          for i in $(seq 1 40); do
            CODE=$(curl -s --max-time 10 -o /dev/null -w "%{http_code}" https://smartfarm.group/connexion)
            echo "  Hit $i: HTTP $CODE (consecutive ok=$ok)"
            if [ "$CODE" = "200" ]; then
              ok=$((ok + 1))
              if [ "$ok" -ge 3 ]; then echo "Server warm after $i hits."; break; fi
            else
              ok=0
            fi
            sleep 3
          done

      - name: Smoke mobile
        env:
          SMOKE_URL: ${{ github.event.inputs.url || 'https://smartfarm.group' }}
          SMOKE_EMAIL: ${{ secrets.SMOKE_EMAIL || 'demo@smartfarm.group' }}
          SMOKE_PASS: ${{ secrets.SMOKE_PASS }}
        run: npm run e2e:smoke:mobile

      - name: Upload Playwright report + test-results (mobile)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-smoke-mobile-${{ github.run_id }}
          path: |
            app/playwright-report/
            app/test-results/
          retention-days: 14
          if-no-files-found: ignore
